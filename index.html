<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App - by Vedant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Montserrat:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="app-layout">
            <div class="todo-app">
                <header class="todo-header">
                    <h1>My To-Do List</h1>
                    <p class="subtitle">Stay organized and productive</p>
                </header>

                <div class="todo-input-container">
                    <input type="text" id="todoInput" class="todo-input" placeholder="Add a new task..."
                        autocomplete="off">
                    <button id="addTodoBtn" class="add-btn">Add</button>
                </div>

                <div class="filter-container">
                    <button id="allTodos" class="filter-btn active" data-filter="all">All</button>
                    <button id="activeTodos" class="filter-btn" data-filter="active">Active</button>
                    <button id="completedTodos" class="filter-btn" data-filter="completed">Completed</button>
                </div>

                <ul id="todoList" class="todo-list">
                </ul>

                <div class="todo-footer">
                    <span id="itemsLeft" class="items-left"><span id="remaining-count">0</span> items left</span>
                    <button id="clearCompletedBtn" class="clear-completed">Clear Completed</button>
                </div>
            </div>

            <aside class="day-panel">
                <div class="day-panel-header">
                    <h2>Select Day</h2>
                    <p>Choose a day and keep every task in order.</p>
                </div>
                <div id="daySelector" class="day-selector"></div>
            </aside>
        </div>
    </div>

    <div id="confirmModal" class="confirm-modal hidden">
        <div class="confirm-modal-card">
            <p class="confirm-title">Delete task?</p>
            <div class="confirm-actions">
                <button id="cancelDeleteBtn" class="modal-btn cancel-btn" type="button">Cancel</button>
                <button id="confirmDeleteBtn" class="modal-btn confirm-btn" type="button">Delete</button>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        <span>Designed by Vedant</span>
        <a href="https://github.com/vedantmb07" target="_blank" rel="noreferrer" aria-label="Visit Vedant's GitHub">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="github-logo">

            </svg>
        </a>
    </footer>

    <script src="app.js"></script>
</body>

</html>
